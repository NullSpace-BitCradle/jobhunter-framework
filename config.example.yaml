# jobhunter-framework - top-level user configuration
#
# Copy this file to `config.yaml` and customize the paths for your setup.
# `config.yaml` is gitignored so your personal paths never leak into the repo.
#
# Design note: the framework expects all user data (MCD, JDs, output, discovery
# configs, state, digests, and the applications tracker) to live under a single
# user-data directory. Keeping everything under one tree makes it simple to
# back up, move between machines, and keep the framework repo purely code.

user_data_dir: ~/JobHunt

# Resume writer inputs/outputs
mcd_path: ~/JobHunt/Master_Career_Document.md
output_dir: ~/JobHunt/output
jd_dir: ~/JobHunt/jobs
applications_file: ~/JobHunt/applications.md

# Job discovery configuration - all data under ~/JobHunt/discovery/
discovery:
  config_dir: ~/JobHunt/discovery/config
  state_file: ~/JobHunt/discovery/state/seen-jobs.json
  digest_dir: ~/JobHunt/discovery/output

# Gmail / Calendar integration (optional)
gmail:
  enabled: false
  account: null
