# Target company registry for Job Discovery Agent.
#
# THIS IS AN EXAMPLE. Copy this file to `companies.yaml` and customize it for
# your own job search. The example below is tuned for a principal-tier
# security / infrastructure job search; replace the company list, tiers, and
# ATS slugs with targets that match your field.
#
# Each entry needs: name, ats, slug
#   ats: greenhouse | lever | ashby | smartrecruiters | workable
#   slug: the identifier the ATS uses for this company's public board
#
# To verify a slug, open the company's careers page and click through to a
# specific job. The URL will reveal the ATS and slug:
#   boards.greenhouse.io/<slug>/...     → ats: greenhouse
#   jobs.lever.co/<slug>/...            → ats: lever
#   jobs.ashbyhq.com/<slug>/...         → ats: ashby
#   jobs.smartrecruiters.com/<slug>/... → ats: smartrecruiters
#   apply.workable.com/<slug>/...       → ats: workable
#
# Workday, iCIMS, and Google Careers are not currently supported. Companies
# on those platforms live in the `manual_check` section at the bottom.
#
# Run `python main.py --verify` after editing to confirm all slugs return
# results. Prune entries that return EMPTY/404.

